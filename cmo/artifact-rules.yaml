# Artifact watcher rules
# Follow-on tasks triggered when artifact files change.
# First run seeds state; subsequent runs dispatch on changes.

rules:
  - name: analytics_report
    enabled: true
    globs:
      - "**/analytics-report.md"
    target: dispatch_queue
    task:
      seat: Forge
      priority: P2
      product: "*"
      task: "Review analytics report and update growth metrics"
      depends_on: ""
      output_file: "cmo/analytics/review-{artifact_relpath}.md"

  - name: blog_drafts
    enabled: true
    globs:
      - "**/blog/*.md"
    target: dispatch_queue
    task:
      seat: Kiro
      priority: P1
      product: "*"
      task: "Review and approve blog draft for publication"
      depends_on: ""
      output_file: "cmo/blog/approval-{artifact_relpath}.md"
